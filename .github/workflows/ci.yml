name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  schedule:
    # Scanare periodica (luni 03:27 UTC)
    - cron: "27 3 * * 1"

# Least privilege: implicit zero permisiuni; fiecare job cere strict ce-i trebuie
permissions: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── 1. CodeQL — SAST (analiza statica a codului) ─────────────────────────
  #     OPSWAT/MDSSC nu face SAST, deci CodeQL ramane ca strat complementar.
  scan-code:
    name: Scan Code (CodeQL)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      security-events: write
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Initializare CodeQL
        uses: github/codeql-action/init@d77b13a0df3134d64a457ea9003f600b09fa1c8a # v3
        with:
          languages: javascript-typescript
          queries: security-extended

      - name: Analiza CodeQL
        uses: github/codeql-action/analyze@d77b13a0df3134d64a457ea9003f600b09fa1c8a # v3

  # ─── 2. Validare YAML — sintaxa fisierelor YAML din repo ──────────────────
  validate-yaml:
    name: Validate YAML
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Validare sintaxa YAML (yamllint)
        uses: ibiqlik/action-yamllint@2576378a8e339169678f9939646ee3ee325e845c # v3
        with:
          config_data: |
            extends: relaxed
            ignore: |
              node_modules/
              **/node_modules/
              **/dist/
              **/build/
            rules:
              line-length: disable
              document-start: disable
              truthy: disable
              comments: disable
              comments-indentation: disable

  # ─── 3. MDSSC — OPSWAT MetaDefender Software Supply Chain ──────────────────
  #     Scaneaza sursa: secrete (Proactive DLP), vulnerabilitati in dependinte,
  #     malware (multiscanning 30+ engine-uri) si genereaza SBOM. Rezultatele
  #     detaliate apar in dashboard-ul MDSSC.
  #     Necesita secretele de repo MDSSC_SERVER + MDSSC_API_KEY, iar serverul
  #     MDSSC trebuie sa fie accesibil de pe runner-ul GitHub.
  mdssc-scan:
    name: MDSSC Scan (OPSWAT)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      # Login optional la Docker Hub: evita rate-limit-ul anonim (10 pull-uri/ora/IP)
      # la opswat/mdssc-scanner. Daca secretele lipsesc, pasul se sare (pull anonim).
      - name: Login Docker Hub (optional)
        if: env.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Scanare MDSSC (secrete + vulnerabilitati + malware + SBOM)
        env:
          MDSSC_SERVER: ${{ secrets.MDSSC_SERVER }}
          MDSSC_API_KEY: ${{ secrets.MDSSC_API_KEY }}
        run: |
          set -e
          # Excludem node_modules/.git/build din scanare; raman manifestele de dependinte
          mkdir -p /tmp/mdssc-src
          rsync -a --exclude='.git' --exclude='node_modules' --exclude='dist' --exclude='build' ./ /tmp/mdssc-src/
          docker run --rm \
            -e MDSSC_SERVER="$MDSSC_SERVER" \
            -e MDSSC_API_KEY="$MDSSC_API_KEY" \
            -e FAIL_ON_VULNERABILITIES="true" \
            -e VULNERABILITY_THRESHOLD="high" \
            -e SCAN_TIMEOUT="900" \
            -v /tmp/mdssc-src:/scan \
            opswat/mdssc-scanner:latest
