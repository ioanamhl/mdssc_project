name: Release

on:
  push:
    branches: ["main"]
    tags: ["v*"]

# Least privilege: implicit zero permisiuni; fiecare job cere strict ce-i trebuie
permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false # nu intrerupem un deploy in curs

jobs:
  # ─── 1. Jenkins — inner pipeline (MDSSC + Build + Deploy) ────────────────
  jenkins:
    name: Jenkins (MDSSC + Build + Deploy)
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2
        with:
          egress-policy: audit

      - name: Porneste pipeline-ul Jenkins si asteapta
        env:
          JENKINS_URL:          ${{ secrets.JENKINS_VPS_URL }}
          JENKINS_USER:         ${{ secrets.JENKINS_USER }}
          JENKINS_API_TOKEN:    ${{ secrets.MDSSC_JENKINS_API_TOKEN }}
          JENKINS_REMOTE_TOKEN: ${{ secrets.JENKINS_REMOTE_TOKEN }}
          JENKINS_JOB:          proiect-mdssc
        run: |
          set -e

          echo "=== Obtin CSRF crumb ==="
          CRUMB=$(curl -s -u "$JENKINS_USER:$JENKINS_API_TOKEN" \
            "$JENKINS_URL/crumbIssuer/api/xml?xpath=concat(//crumbRequestField,\":\",//crumb)")
          echo "Crumb: $CRUMB"

          echo "=== Triggering Jenkins job: $JENKINS_JOB ==="
          curl -s -X POST \
            "$JENKINS_URL/job/$JENKINS_JOB/buildWithParameters" \
            -u "$JENKINS_USER:$JENKINS_API_TOKEN" \
            -H "$CRUMB" \
            -D /tmp/trigger_headers.txt -o /dev/null

          HTTP_CODE=$(grep "HTTP/" /tmp/trigger_headers.txt | tail -1 | awk '{print $2}')
          echo "Trigger HTTP status: $HTTP_CODE"
          if [ "$HTTP_CODE" != "201" ] && [ "$HTTP_CODE" != "200" ]; then
            echo "ERROR: Jenkins trigger failed (HTTP $HTTP_CODE)"
            cat /tmp/trigger_headers.txt
            exit 1
          fi

          QUEUE_URL=$(grep -i "^Location:" /tmp/trigger_headers.txt | tr -d '\r' | awk '{print $2}')
          echo "Queue URL: $QUEUE_URL"

          echo "=== Astept pornirea build-ului (max 2 min) ==="
          BUILD_URL=""
          for i in $(seq 1 24); do
            sleep 5
            BUILD_URL=$(curl -s -u "$JENKINS_USER:$JENKINS_API_TOKEN" \
              "${QUEUE_URL}api/json" | \
              python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('executable',{}).get('url',''))" 2>/dev/null || echo "")
            if [ -n "$BUILD_URL" ]; then
              echo "Build pornit: $BUILD_URL"
              break
            fi
            echo "  astept... ($i/24)"
          done

          if [ -z "$BUILD_URL" ]; then
            echo "ERROR: Build-ul nu a pornit in 2 minute"
            exit 1
          fi

          echo "=== Polling status build (max 35 min) ==="
          for i in $(seq 1 140); do
            sleep 15
            RESULT=$(curl -s -u "$JENKINS_USER:$JENKINS_API_TOKEN" \
              "${BUILD_URL}api/json" | \
              python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('result') or '')" 2>/dev/null || echo "")
            echo "  [$i/140] status: ${RESULT:-IN_PROGRESS}"
            if [ "$RESULT" = "SUCCESS" ]; then
              echo "=== Jenkins build REUSIT ==="
              exit 0
            elif [ -n "$RESULT" ]; then
              echo "=== Jenkins build ESUAT: $RESULT ==="
              echo "  URL build: $BUILD_URL"
              exit 1
            fi
          done

          echo "ERROR: Timeout dupa 35 minute"
          exit 1

  # ─── 2. E2E — Playwright pe VPS-ul deja deployat de Jenkins ──────────────
  e2e:
    name: E2E Tests (Playwright)
    needs: jenkins
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2
        with:
          egress-policy: audit

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20

      - name: Instaleaza dependinte E2E
        run: npm ci
        working-directory: e2e

      - name: Instaleaza Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: e2e

      - name: Ruleaza teste E2E
        run: npx playwright test
        working-directory: e2e
        env:
          BASE_URL: ${{ secrets.VPS_BASE_URL }}

      - name: Upload raport Playwright
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-report
          path: e2e/playwright-report/

  # ─── 3. Release — SBOM + semnare + provenance + GitHub Release (doar tag v*)
  #     Nota: SBOM/semnatura acopera supply-chain-ul SURSEI generat in Actions.
  #     Artefactul binar e construit in Jenkins (zona infra) si nu e acoperit aici.
  release:
    name: GitHub Release
    needs: e2e
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write # creeaza release-ul + urca asset-urile
      id-token: write # cosign keyless + atestare (OIDC)
      attestations: write # build provenance attestation
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2
        with:
          egress-policy: audit

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Generare SBOM (sursa)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: .
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: false

      - name: Instalare cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: Semnare SBOM (cosign keyless)
        run: |
          cosign sign-blob --yes \
            --output-signature sbom.spdx.json.sig \
            --output-certificate sbom.spdx.json.pem \
            sbom.spdx.json

      - name: Atestare provenance pentru SBOM
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: sbom.spdx.json

      - name: Creaza GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          generate_release_notes: true
          files: |
            sbom.spdx.json
            sbom.spdx.json.sig
            sbom.spdx.json.pem
