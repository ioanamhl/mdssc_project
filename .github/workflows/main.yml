name: Outer CI/CD

on:
  push:
    branches: ["**"]
    tags: ["v*"]

jobs:
  # ─── 1. CodeQL — scanare statica cod sursa ────────────────────────────────
  scan-code:
    name: Scan Code (CodeQL)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Initializare CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript

      - name: Analiza CodeQL
        uses: github/codeql-action/analyze@v3

  # ─── 2. Jenkins — inner pipeline (MDSSC + Build + Deploy) ────────────────
  jenkins:
    name: Jenkins (MDSSC + Build + Deploy)
    needs: scan-code
    runs-on: ubuntu-latest
    steps:
      - name: Porneste pipeline-ul Jenkins si asteapta
        env:
          JENKINS_URL:          ${{ secrets.JENKINS_VPS_URL }}
          JENKINS_USER:         ${{ secrets.JENKINS_USER }}
          JENKINS_API_TOKEN:    ${{ secrets.MDSSC_JENKINS_API_TOKEN }}
          JENKINS_REMOTE_TOKEN: ${{ secrets.JENKINS_REMOTE_TOKEN }}
          JENKINS_JOB:          proiect-mdssc
        run: |
          set -e

          echo "=== Obtin CSRF crumb ==="
          CRUMB=$(curl -s -u "$JENKINS_USER:$JENKINS_API_TOKEN" \
            "$JENKINS_URL/crumbIssuer/api/xml?xpath=concat(//crumbRequestField,\":\",//crumb)")
          echo "Crumb: $CRUMB"

          echo "=== Triggering Jenkins job: $JENKINS_JOB ==="
          curl -s -X POST \
            "$JENKINS_URL/job/$JENKINS_JOB/build?token=$JENKINS_REMOTE_TOKEN" \
            -u "$JENKINS_USER:$JENKINS_API_TOKEN" \
            -H "$CRUMB" \
            -D /tmp/trigger_headers.txt -o /dev/null

          HTTP_CODE=$(grep "HTTP/" /tmp/trigger_headers.txt | tail -1 | awk '{print $2}')
          echo "Trigger HTTP status: $HTTP_CODE"
          if [ "$HTTP_CODE" != "201" ] && [ "$HTTP_CODE" != "200" ]; then
            echo "ERROR: Jenkins trigger failed (HTTP $HTTP_CODE)"
            cat /tmp/trigger_headers.txt
            exit 1
          fi

          QUEUE_URL=$(grep -i "^Location:" /tmp/trigger_headers.txt | tr -d '\r' | awk '{print $2}')
          echo "Queue URL: $QUEUE_URL"

          echo "=== Astept pornirea build-ului (max 2 min) ==="
          BUILD_URL=""
          for i in $(seq 1 24); do
            sleep 5
            BUILD_URL=$(curl -s -u "$JENKINS_USER:$JENKINS_API_TOKEN" \
              "${QUEUE_URL}api/json" | \
              python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('executable',{}).get('url',''))" 2>/dev/null || echo "")
            if [ -n "$BUILD_URL" ]; then
              echo "Build pornit: $BUILD_URL"
              break
            fi
            echo "  astept... ($i/24)"
          done

          if [ -z "$BUILD_URL" ]; then
            echo "ERROR: Build-ul nu a pornit in 2 minute"
            exit 1
          fi

          echo "=== Polling status build (max 35 min) ==="
          for i in $(seq 1 140); do
            sleep 15
            RESULT=$(curl -s -u "$JENKINS_USER:$JENKINS_API_TOKEN" \
              "${BUILD_URL}api/json" | \
              python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('result') or '')" 2>/dev/null || echo "")
            echo "  [$i/140] status: ${RESULT:-IN_PROGRESS}"
            if [ "$RESULT" = "SUCCESS" ]; then
              echo "=== Jenkins build REUSIT ==="
              exit 0
            elif [ -n "$RESULT" ]; then
              echo "=== Jenkins build ESUAT: $RESULT ==="
              echo "  URL build: $BUILD_URL"
              exit 1
            fi
          done

          echo "ERROR: Timeout dupa 35 minute"
          exit 1

  # ─── 3. E2E — Playwright pe VPS-ul deja deployat de Jenkins ──────────────
  e2e:
    name: E2E Tests (Playwright)
    needs: jenkins
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instaleaza dependinte E2E
        run: npm ci
        working-directory: e2e

      - name: Instaleaza Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: e2e

      - name: Ruleaza teste E2E
        run: npx playwright test
        working-directory: e2e
        env:
          BASE_URL: ${{ secrets.VPS_BASE_URL }}

      - name: Upload raport Playwright
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/

  # ─── 4. Release — tag GitHub daca totul e verde ──────────────────────────
  release:
    name: GitHub Release
    needs: e2e
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Creaza GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
