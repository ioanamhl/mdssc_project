name: Scorecard

on:
  push:
    branches: ["main"]
  schedule:
    # Saptamanal (luni 04:23 UTC) — postura de securitate a repo-ului
    - cron: "23 4 * * 1"
  workflow_dispatch:

permissions: {}

concurrency:
  group: scorecard-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      security-events: write # urca SARIF in tab-ul Security
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2
        with:
          egress-policy: audit

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Run OpenSSF Scorecard
        uses: ossf/scorecard-action@f2ea147fec3c2f0d459703eba7405b5e9bcd8c8f # v2.4.2
        with:
          results_file: results.sarif
          results_format: sarif
          # publish_results=false: nu publicam in dataset-ul public OpenSSF (evita id-token)
          publish_results: false

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 5

      - name: Upload SARIF (Security tab)
        uses: github/codeql-action/upload-sarif@d77b13a0df3134d64a457ea9003f600b09fa1c8a # v3
        with:
          sarif_file: results.sarif
          category: scorecard
